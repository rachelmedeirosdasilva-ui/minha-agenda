<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2; --card: #FFFFFF; --wood: #8B5E3C; --wood-light: #C4956A;
    --wood-dark: #5C3D22; --accent: #D4A853; --text: #2C1F10;
    --text-muted: #8A7060; --border: #E8DDD0; --red: #C0392B;
    --green: #2E7D5E; --blue: #2C5F8A; --shadow: 0 2px 16px rgba(44,31,16,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--wood-dark); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); }
  header h1 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1.5rem; }
  header p { color: #C4A882; font-size: 0.8rem; margin-top: 2px; }
  .stats { display: flex; gap: 14px; }
  .stat { background: rgba(255,255,255,0.07); border-radius: 10px; padding: 8px 14px; text-align: center; border: 1px solid rgba(212,168,83,0.3); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.68rem; color: #C4A882; margin-top: 2px; }
  .container { max-width: 920px; margin: 0 auto; padding: 24px 18px; }
  .add-form { background: var(--card); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 24px; border: 1px solid var(--border); }
  .add-form h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--wood-dark); margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  input, select, textarea { width: 100%; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.87rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--wood-light); }
  textarea { resize: vertical; min-height: 56px; }
  label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field { display: flex; flex-direction: column; }
  .btn-add { background: var(--wood-dark); color: var(--accent); border: none; border-radius: 10px; padding: 11px 28px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.88rem; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; margin-top: 2px; }
  .btn-add:hover { background: var(--wood); transform: translateY(-1px); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; align-items: center; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { background: var(--wood-dark); color: var(--accent); border-color: var(--wood-dark); }
  .search-input { flex: 1; min-width: 180px; padding: 7px 13px; font-size: 0.84rem; }
  .category-group { margin-bottom: 28px; }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .category-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .category-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--wood-dark); flex: 1; }
  .category-count { font-size: 0.72rem; background: var(--border); color: var(--text-muted); border-radius: 10px; padding: 2px 10px; }
  .task-card { background: var(--card); border-radius: 13px; padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); border: 1.5px solid var(--border); border-left: 4px solid var(--wood-light); display: flex; align-items: flex-start; gap: 12px; transition: box-shadow 0.2s, transform 0.15s; }
  .task-card.done { opacity: 0.5; border-left-color: #bbb; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }
  .task-card.prio-alta { border-left-color: var(--red); }
  .task-card.prio-media { border-left-color: var(--accent); }
  .task-card.prio-baixa { border-left-color: var(--green); }
  .task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: white; }
  .task-check.checked { background: var(--green); border-color: var(--green); }
  .task-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: bold; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 500; font-size: 0.92rem; margin-bottom: 3px; line-height: 1.3; }
  .task-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; line-height: 1.4; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 8px; font-weight: 500; background: var(--border); color: var(--text-muted); }
  .tag.prio-alta { background: #FDEAEA; color: var(--red); }
  .tag.prio-media { background: #FEF5E0; color: #946C00; }
  .tag.prio-baixa { background: #E4F4EC; color: var(--green); }
  .tag.date { background: #E8EEF5; color: var(--blue); }
  .tag.overdue { background: #FDEAEA; color: var(--red); }
  .task-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text-muted); }
  .btn-icon.del:hover { background: #FDEAEA; border-color: var(--red); color: var(--red); }
  .empty-global { text-align: center; padding: 52px 20px; color: var(--text-muted); font-size: 0.9rem; }
  .empty-global .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  @media (max-width: 600px) {
    header { flex-direction: column; gap: 12px; text-align: center; }
    .stats { justify-content: center; }
    .form-row, .form-row.triple { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>🪵 Minha Agenda</h1>
    <p>Gestão pessoal — por categoria</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-pendente">0</div><div class="stat-label">Pendentes</div></div>
    <div class="stat"><div class="stat-num" id="stat-feito">0</div><div class="stat-label">Concluídas</div></div>
  </div>
</header>
<div class="container">
  <div class="add-form">
    <h2>➕ Nova Tarefa</h2>
    <div class="form-row">
      <div class="field form-full"><label>Tarefa *</label><input type="text" id="inp-titulo" placeholder="O que precisa ser feito?" /></div>
    </div>
    <div class="form-row">
      <div class="field form-full"><label>Descrição (opcional)</label><textarea id="inp-desc" placeholder="Detalhes, observações..."></textarea></div>
    </div>
    <div class="form-row triple">
      <div class="field"><label>Categoria</label>
        <select id="inp-cat">
          <option value="Clientes">🤝 Clientes</option>
          <option value="Orçamentos">💬 Orçamentos</option>
          <option value="Entregas">🚚 Entregas</option>
          <option value="Fornecedores">📦 Fornecedores</option>
          <option value="Financeiro">💰 Financeiro</option>
          <option value="Equipe">👥 Equipe</option>
          <option value="Administrativo">📋 Administrativo</option>
          <option value="Pessoal">⭐ Pessoal</option>
        </select>
      </div>
      <div class="field"><label>Prioridade</label>
        <select id="inp-prio">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Média</option>
          <option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <div class="field"><label>Prazo</label><input type="date" id="inp-data" /></div>
    </div>
    <button class="btn-add" onclick="addTask()">Adicionar Tarefa</button>
  </div>
  <div class="filters">
    <input type="text" class="search-input" id="search" placeholder="🔍 Buscar tarefa..." oninput="render()" />
    <button class="filter-btn active" onclick="setFilter('todas',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('pendentes',this)">Pendentes</button>
    <button class="filter-btn" onclick="setFilter('concluidas',this)">Concluídas</button>
    <button class="filter-btn" onclick="setFilter('alta',this)">🔴 Urgentes</button>
    <button class="filter-btn" onclick="setFilter('hoje',this)">📅 Hoje</button>
  </div>
  <div id="task-list"></div>
</div>
<script>
  const CATEGORIES = [
    {key:'Clientes',icon:'🤝',color:'#EAF4FB'},{key:'Orçamentos',icon:'💬',color:'#FEF9EC'},
    {key:'Entregas',icon:'🚚',color:'#EDF7F2'},{key:'Fornecedores',icon:'📦',color:'#F5F0E8'},
    {key:'Financeiro',icon:'💰',color:'#FEF5E0'},{key:'Equipe',icon:'👥',color:'#F0EBF8'},
    {key:'Administrativo',icon:'📋',color:'#EEF2F5'},{key:'Pessoal',icon:'⭐',color:'#FFF8EC'},
  ];
  let tasks = [], currentFilter = 'todas';
  const KEY = 'agenda_marcenaria';
  function load() { try { tasks = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){tasks=[];} render(); }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch(e){} }
  function today() { return new Date().toISOString().split('T')[0]; }
  function addTask() {
    const titulo = document.getElementById('inp-titulo').value.trim();
    if (!titulo) { const el=document.getElementById('inp-titulo'); el.focus(); el.style.borderColor='var(--red)'; setTimeout(()=>el.style.borderColor='',1500); return; }
    tasks.unshift({id:Date.now(),titulo,desc:document.getElementById('inp-desc').value.trim(),cat:document.getElementById('inp-cat').value,prio:document.getElementById('inp-prio').value,data:document.getElementById('inp-data').value,done:false});
    save(); render();
    document.getElementById('inp-titulo').value=''; document.getElementById('inp-desc').value=''; document.getElementById('inp-data').value=''; document.getElementById('inp-prio').value='media'; document.getElementById('inp-titulo').focus();
  }
  function toggleDone(id) { const t=tasks.find(t=>t.id===id); if(t){t.done=!t.done;save();render();} }
  function deleteTask(id) { if(confirm('Remover esta tarefa?')){tasks=tasks.filter(t=>t.id!==id);save();render();} }
  function setFilter(f,btn) { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
  function formatDate(d) { if(!d)return''; const[y,m,day]=d.split('-'); return`${day}/${m}/${y}`; }
  function render() {
    const search=document.getElementById('search').value.toLowerCase();
    let filtered=tasks.filter(t=>{
      if(search&&!t.titulo.toLowerCase().includes(search)&&!(t.desc||'').toLowerCase().includes(search))return false;
      if(currentFilter==='pendentes')return!t.done;
      if(currentFilter==='concluidas')return t.done;
      if(currentFilter==='alta')return t.prio==='alta'&&!t.done;
      if(currentFilter==='hoje')return t.data===today()&&!t.done;
      return true;
    });
    document.getElementById('stat-total').textContent=tasks.length;
    document.getElementById('stat-pendente').textContent=tasks.filter(t=>!t.done).length;
    document.getElementById('stat-feito').textContent=tasks.filter(t=>t.done).length;
    const list=document.getElementById('task-list');
    if(!filtered.length){list.innerHTML='<div class="empty-global"><div class="empty-icon">📋</div>Nenhuma tarefa encontrada.</div>';return;}
    let html='';
    CATEGORIES.forEach(cat=>{
      const catTasks=filtered.filter(t=>t.cat===cat.key).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const p={alta:0,media:1,baixa:2};return p[a.prio]-p[b.prio];});
      if(!catTasks.length)return;
      html+=`<div class="category-group"><div class="category-header"><div class="category-icon" style="background:${cat.color}">${cat.icon}</div><div class="category-name">${cat.key}</div><span class="category-count">${catTasks.length} tarefa${catTasks.length>1?'s':''}</span></div>`;
      catTasks.forEach(t=>{
        const overdue=!t.done&&t.data&&t.data<today();
        html+=`<div class="task-card prio-${t.prio}${t.done?' done':''}"><div class="task-check${t.done?' checked':''}" onclick="toggleDone(${t.id})"></div><div class="task-body"><div class="task-title">${t.titulo}</div>${t.desc?`<div class="task-desc">${t.desc}</div>`:''}<div class="task-meta"><span class="tag prio-${t.prio}">${t.prio==='alta'?'🔴 Alta':t.prio==='media'?'🟡 Média':'🟢 Baixa'}</span>${t.data?`<span class="tag ${overdue?'overdue':'date'}">${overdue?'⚠️ Atrasado · ':'📅 '}${formatDate(t.data)}</span>`:''}</div></div><div class="task-actions"><button class="btn-icon del" onclick="deleteTask(${t.id})">🗑</button></div></div>`;
      });
      html+='</div>';
    });
    list.innerHTML=html||'<div class="empty-global"><div class="empty-icon">📋</div>Nenhuma tarefa encontrada.</div>';
  }
  document.getElementById('inp-titulo').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  load();
</script>
</body>
</html>
